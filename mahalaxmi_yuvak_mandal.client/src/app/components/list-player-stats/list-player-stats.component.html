<div class="card">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="m-0">Player Stats List</h2>
    <div class="d-flex gap-2">
      <a routerLink="/create-player-stats" class="btn btn-primary"
        >Create Player Stats</a
      >
      <!-- PDF Download Button with Loading State -->
      <button
        type="button"
        class="btn btn-danger d-flex align-items-center"
        (click)="downloadPdfReport()"
      >
        <i class="fas fa-file-pdf"></i>
      </button>
    </div>
  </div>

  <div class="card-body">
    <table class="table table-bordered table-striped">
      <thead>
        <tr>
          <th>Player</th>
          <th>Team</th>
          <th>Runs</th>
          <th>Balls</th>
          <th>4s</th>
          <th>6s</th>
          <th>Overs</th>
          <th>Runs Given</th>
          <th>Wickets</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let s of stats">
          <td>{{ s.playerName }}</td>
          <td>{{ s.teamName }}</td>
          <td>{{ s.runsScored }}</td>
          <td>{{ s.ballsPlayed }}</td>
          <td>{{ s.fours }}</td>
          <td>{{ s.sixes }}</td>
          <td>{{ s.oversBowled }}</td>
          <td>{{ s.runsGiven }}</td>
          <td>{{ s.wicketsTaken }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
