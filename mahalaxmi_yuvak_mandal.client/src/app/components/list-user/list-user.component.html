<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="m-0">Users List</h2>
    <div class="d-flex gap-2">
      <a routerLink="/create-donation" class="btn btn-primary"> Create User </a>
      <!-- PDF Download Button with Loading State -->
      <button
        type="button"
        class="btn btn-danger d-flex align-items-center"
        (click)="downloadPdfReport()"
      >
        <i class="fas fa-file-pdf"></i>
      </button>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-striped table-bordered align-middle">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Full Name</th>
          <th>Email</th>
          <th>Role</th>
          <th class="text-center">Active</th>
          <th>Created Date</th>
          <th class="text-center" *ngIf="userRole === 'Admin'">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td>{{ user.id }}</td>
          <td class="fw-bold">{{ user.fullName }}</td>
          <td>{{ user.email }}</td>
          <td>
            <span class="badge bg-info text-dark">{{
              user.role || "User"
            }}</span>
          </td>
          <td class="text-center">
            <span
              class="badge"
              [ngClass]="user.isActive ? 'bg-success' : 'bg-secondary'"
            >
              {{ user.isActive ? "Yes" : "No" }}
            </span>
          </td>
          <td>{{ user.createdDate | date: "dd-MMM-yyyy" }}</td>
          <td class="text-center" *ngIf="userRole === 'Admin'">
            <button
              class="btn btn-sm btn-outline-primary me-1"
              (click)="editUser(user)"
              title="Edit"
            >
              <i class="fas fa-edit"></i>
            </button>
            <button
              class="btn btn-sm btn-outline-danger"
              (click)="deleteUser(user.id)"
              title="Delete"
            >
              <i class="fas fa-trash-alt"></i>
            </button>
          </td>
        </tr>
        <!-- Empty State -->
        <tr *ngIf="users.length === 0">
          <td colspan="7" class="text-center py-4 text-muted">
            No users found.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
