<div class="container mt-4">
  <h2 class="mb-3">Users List</h2>

  <table class="table table-striped table-bordered">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Full Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Active</th>
        <th>Created Date</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users">
        <td>{{ user.id }}</td>
        <td>{{ user.fullName }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.role || "N/A" }}</td>
        <td>
          <span
            class="badge"
            [ngClass]="user.isActive ? 'bg-success' : 'bg-secondary'"
          >
            {{ user.isActive ? "Yes" : "No" }}
          </span>
        </td>
        <td>{{ user.createdDate | date: "medium" }}</td>
        <td>
          <button class="btn btn-sm btn-primary me-1" (click)="editUser(user)">
            <i class="fas fa-edit"></i>
          </button>

          <!-- Delete Icon -->
          <button class="btn btn-sm btn-danger" (click)="deleteUser(user.id)">
            <i class="fas fa-trash-alt"></i>
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
