<div class="wrapper">
  <!-- Navbar -->
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <!-- Left navbar -->
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#">
          <i class="fas fa-bars"></i>
        </a>
      </li>

      <li class="nav-item d-none d-sm-inline-block">
        <a class="nav-link">Home</a>
      </li>

      <li class="nav-item d-none d-sm-inline-block">
        <a class="nav-link">Contact</a>
      </li>
    </ul>

    <!-- Right navbar -->
    <ul class="navbar-nav ml-auto">
      <!-- Search -->
      <li class="nav-item">
        <a class="nav-link" data-widget="navbar-search">
          <i class="fas fa-search"></i>
        </a>
      </li>

      <!-- Messages -->
      <li class="nav-item dropdown">
        <a class="nav-link" data-toggle="dropdown">
          <i class="far fa-comments"></i>
          <span class="badge badge-danger navbar-badge">3</span>
        </a>
      </li>

      <!-- Notifications -->
      <li class="nav-item dropdown">
        <a class="nav-link" data-toggle="dropdown">
          <i class="far fa-bell"></i>
          <span class="badge badge-warning navbar-badge">15</span>
        </a>
      </li>

      <!-- Fullscreen -->
      <li class="nav-item">
        <a class="nav-link" data-widget="fullscreen">
          <i class="fas fa-expand-arrows-alt"></i>
        </a>
      </li>
    </ul>

    <a class="brand-link text-center">

    <div class="sidebar">

      <nav class="mt-2">

          data-widget="treeview"
          role="menu"
          data-accordion="false"

          <!-- Dashboard -->
          <li class="nav-item">
            <a [routerLink]="['/dashboard']" class="nav-link">
              <i class="nav-icon fas fa-tachometer-alt"></i>
              <p>Dashboard</p>
            </a>
          </li>

          <!-- Admin -->
          <li class="nav-item">
            <a [routerLink]="['/list-admins']" class="nav-link">
              <i class="nav-icon fas fa-user-shield"></i>
              <p>Admin</p>
            </a>
          </li>

          <!-- Users Menu -->
          <li class="nav-item has-treeview">
            <a href="#" class="nav-link">
              <i class="nav-icon fas fa-users"></i>
              <p>
                Users
                <i class="right fas fa-angle-left"></i>
              </p>
            </a>

            <ul class="nav nav-treeview">
              <li class="nav-item">
                <a [routerLink]="['/create-user']" class="nav-link">
                  <i class="far fa-circle nav-icon"></i>
                  <p>Create User</p>
                </a>
              </li>

              <li class="nav-item">
                <a [routerLink]="['/list-users']" class="nav-link">
                  <i class="far fa-circle nav-icon"></i>
                  <p>User List</p>
                </a>
              </li>
            </ul>
          </li>

          <li class="nav-item has-treeview">
            <a href="#" class="nav-link">
              <i class="nav-icon fas fa-users"></i>
              <p>
                Donation
                <i class="right fas fa-angle-left"></i>
              </p>
            </a>

            <ul class="nav nav-treeview">
              <li class="nav-item">
                <a [routerLink]="['/create-donation']" class="nav-link">
                  <i class="far fa-circle nav-icon"></i>
                  <p>Create Donation</p>
                </a>
              </li>

              <li class="nav-item">
                <a [routerLink]="['/list-donation']" class="nav-link">
                  <i class="far fa-circle nav-icon"></i>
                  <p>Donation List</p>
                </a>
              </li>
            </ul>
          </li>
        </ul>
      </nav>
      <!-- /.sidebar-menu -->
    </div>
    <!-- /.sidebar -->

  <div class="content-wrapper">
    <section class="content pt-3">
      <div class="container-fluid">
        <router-outlet></router-outlet>
      </div>

  </div>

  <!-- Footer -->
  <footer class="main-footer">
    <strong>
      Copyright © 2021
