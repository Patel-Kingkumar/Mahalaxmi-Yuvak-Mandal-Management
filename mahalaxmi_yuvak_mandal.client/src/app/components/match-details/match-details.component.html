<hr />

<h4>Add Match Score</h4>

<form [formGroup]="scoreForm" (ngSubmit)="addScore()">
  <div class="row">
    <div class="col-md-3">
      <label>Team Name</label>
      <input type="text" class="form-control" formControlName="teamName" />
    </div>

    <div class="col-md-2">
      <label>Runs</label>
      <input type="number" class="form-control" formControlName="runs" />
    </div>

    <div class="col-md-2">
      <label>Wickets</label>
      <input type="number" class="form-control" formControlName="wickets" />
    </div>

    <div class="col-md-2">
      <label>Overs</label>
      <input
        type="number"
        step="0.1"
        class="form-control"
        formControlName="oversPlayed"
      />
    </div>

    <div class="col-md-2 mt-4">
      <button class="btn btn-success">Add Score</button>
    </div>
  </div>
</form>

<h4 class="mt-4">Scorecard</h4>

<table class="table table-bordered">
  <thead>
    <tr>
      <th>Team</th>
      <th>Runs</th>
      <th>Wickets</th>
      <th>Overs</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let s of scores">
      <td>{{ s.TeamName }}</td>
      <td>{{ s.Runs }}</td>
      <td>{{ s.Wickets }}</td>
      <td>{{ s.OversPlayed }}</td>
    </tr>
  </tbody>
</table>
